name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to create'
        required: true

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Check version in tpay.php
        run: if [ $(grep -e "$this->version = '${{ github.event.inputs.version }}';" tpay.php -c) != 1 ]; then exit 1; fi

      - name: Check Changelog
        run: if [ $(grep ${{ github.event.inputs.version }} CHANGELOG.MD -c) != 1 ]; then exit 1; fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 7.1
          extensions: none, curl, dom, mbstring, simplexml, tokenizer, xml, xmlwriter, json, fileinfo
          coverage: none

      - run: composer install --no-dev -o

      - run: git archive --output=tpay-prestashop.zip HEAD --prefix=tpay/

      - run: mkdir tpay && mv vendor tpay/
      - run: zip -ur tpay-prestashop.zip tpay/
      - run: zip -d tpay-prestashop.zip "tpay/_dev/*"
      - run: zip -d tpay-prestashop.zip "tpay/.github/*"
      - run: zip -d tpay-prestashop.zip "tpay/.php*"
      - run: zip -d tpay-prestashop.zip "tpay/.gitignore"

      - name: Build marketplace zip
        run: |
          cp tpay-prestashop.zip tpay-prestashop-marketplace.zip
          mkdir -p marketplace_patch/tpay
          unzip -j tpay-prestashop.zip "tpay/tpay.php" -d marketplace_patch/tpay/
          sed -i "s/define('_TPAY_MARKETPLACE_RELEASE', false)/define('_TPAY_MARKETPLACE_RELEASE', true)/" marketplace_patch/tpay/tpay.php
          cd marketplace_patch && zip -u ../tpay-prestashop-marketplace.zip tpay/tpay.php

      - name: Create Github release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          name: "v${{ github.event.inputs.version }}"
          generateReleaseNotes: true
          artifacts: "tpay-prestashop.zip,tpay-prestashop-marketplace.zip"
