name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to create'
        required: true

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Check version
        run: |
          for FILE in tpay.php config.xml config_pl.xml CHANGELOG.MD; do
            if [ $(grep ${{ github.event.inputs.version }} "$FILE" -c) != 1 ]; then
              echo "Version ${{ github.event.inputs.version }} not found in $FILE"
              exit 1
            fi
          done

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 7.1
          extensions: none, curl, dom, mbstring, simplexml, tokenizer, xml, xmlwriter, json, fileinfo
          coverage: none

      - run: composer install --no-dev

      - run: git archive --output=tpay-prestashop.zip HEAD --prefix=tpay/

      - run: mkdir tpay && mv vendor tpay/
      - run: zip -ur tpay-prestashop.zip tpay/

      - name: Create Github release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          name: "v${{ github.event.inputs.version }}"
          generateReleaseNotes: true
          artifacts: tpay-prestashop.zip
